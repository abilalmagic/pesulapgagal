<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000000;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            z-index: 10;
            position: absolute;
            top: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .dice-count-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dice-count-wrap label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dice-count-wrap select {
            background: rgba(255,255,255,0.05);
            color: #a855f7;
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }

        .dice-count-wrap select option {
            background: #000;
            color: #a855f7;
        }

        #canvas-container {
            width: 100%;
            flex: 1;
            position: relative;
            background: #000;
            z-index: 1;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .tap-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .tap-overlay.hidden { opacity: 0; pointer-events: none; }

        .tap-icon {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(168, 85, 247, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            animation: tapPulse 2s ease-in-out infinite;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.5);
        }

        @keyframes tapPulse {
            0%, 100% { transform: scale(1); border-color: rgba(168,85,247,0.4); box-shadow: 0 0 20px rgba(168,85,247,0.1); }
            50% { transform: scale(1.1); border-color: rgba(168,85,247,0.8); box-shadow: 0 0 40px rgba(168,85,247,0.3); }
        }

        .tap-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: rgba(168, 85, 247, 0.6);
            margin-top: 15px;
            text-transform: uppercase;
        }

        .rolling-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            pointer-events: none;
            display: none;
        }

        .rolling-indicator.show { display: flex; }

        .rolling-ring {
            width: 80px;
            height: 80px;
            border: 2px solid transparent;
            border-top: 2px solid #a855f7;
            border-right: 2px solid #00f0ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .bottom-bar {
            width: 100%;
            position: absolute;
            bottom: 0;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            padding: 20px 20px 30px;
        }

        .dice-results {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            min-height: 32px;
        }

        .dice-chip {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 8px;
            padding: 4px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #a855f7;
            animation: chipIn 0.3s ease-out backwards;
        }

        @keyframes chipIn {
            from { opacity: 0; transform: scale(0.5) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .total-line { text-align: center; }

        .total-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(90deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .total-pos {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.sent { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-dot.pending { background: #f0c27f; box-shadow: 0 0 8px #f0c27f; animation: blink 1s infinite; }
        .status-dot.error { background: #ff4466; box-shadow: 0 0 8px #ff4466; }

        @keyframes blink { 50% { opacity: 0.3; } }

        .status-text {
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 6px;
            gap: 4px;
        }

        .line-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168,85,247,0.3), transparent);
        }

        @media (max-width: 600px) {
            .dice-chip { padding: 3px 8px; font-size: 0.75rem; }
            .total-value { font-size: 1.3rem; }
            .tap-icon { width: 60px; height: 60px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="dice-count-wrap">
            <label>Dice</label>
            <select id="diceCount">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10" selected>10</option>
            </select>
        </div>
    </div>

    <div id="canvas-container">
        <div class="tap-overlay" id="tapOverlay">
            <div class="tap-icon">🎲</div>
            <div class="tap-text">Tap anywhere to roll</div>
        </div>
        <div class="rolling-indicator" id="rollingIndicator">
            <div class="rolling-ring"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="dice-results" id="diceResults"></div>
        <div class="total-line" id="totalLine" style="display:none;">
            <div class="total-value" id="totalValue"></div>
            <div class="total-pos" id="totalPos"></div>
        </div>
        <div class="status-text" id="statusText"></div>
        <div class="line-glow"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        const MNEMONICA = [
            "4 of Clubs","2 of Hearts","7 of Diamonds","3 of Clubs",
            "4 of Hearts","6 of Diamonds","Ace of Spades","5 of Hearts",
            "9 of Spades","2 of Spades","Queen of Hearts","3 of Diamonds",
            "Queen of Clubs","8 of Hearts","6 of Spades","5 of Spades",
            "9 of Hearts","King of Clubs","2 of Diamonds","Jack of Hearts",
            "3 of Spades","8 of Spades","6 of Hearts","10 of Clubs",
            "5 of Diamonds","King of Diamonds","2 of Clubs","3 of Hearts",
            "8 of Diamonds","5 of Clubs","King of Spades","Jack of Diamonds",
            "8 of Clubs","10 of Spades","King of Hearts","Jack of Clubs",
            "7 of Spades","10 of Hearts","Ace of Diamonds","4 of Spades",
            "7 of Hearts","4 of Diamonds","Ace of Clubs","9 of Clubs",
            "Jack of Spades","Queen of Diamonds","7 of Clubs","Queen of Spades",
            "10 of Diamonds","6 of Clubs","Ace of Hearts","9 of Diamonds"
        ];

        function getCard(total) {
            const pos = ((total - 1) % 52) + 1;
            return { pos, card: MNEMONICA[pos - 1] };
        }

        async function sendNtfy(card, total, diceValues) {
            const statusText = document.getElementById('statusText');
            statusText.innerHTML = '<span class="status-dot pending"></span> SENDING...';

            const body = `Dice: [${diceValues.join(', ')}] | Total: ${total} | Card: ${card.card}`;

            try {
                const res = await fetch('https://ntfy.sh/aijayz', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain',
                        'Title': 'Dice Result'
                    },
                    body: body
                });

                if (res.ok) {
                    statusText.innerHTML = '<span class="status-dot sent"></span> ';
                } else {
                    statusText.innerHTML = '<span class="status-dot error"></span> ERROR ' + res.status;
                }
            } catch (e) {
                statusText.innerHTML = '<span class="status-dot error"></span> ' + e.message;
            }
        }

        let scene, camera, renderer, world;
        let diceBodies = [], diceMeshes = [];
        let isRolling = false;
        let animFrameId = null;
        const BOUND = 2.0; // Dinding diperketat agar tidak outframe

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Camera diatur lebih tinggi & mundur sedikit agar 10 dadu muat full di HP
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 7.5, 5.5);
            camera.lookAt(0, 0.2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.45));

            const dl = new THREE.DirectionalLight(0xffffff, 0.7);
            dl.position.set(2, 12, 2);
            dl.castShadow = true;
            dl.shadow.mapSize.set(1024, 1024);
            scene.add(dl);

            const pl1 = new THREE.PointLight(0xa855f7, 0.3, 15);
            pl1.position.set(-4, 3, -3);
            scene.add(pl1);

            const pl2 = new THREE.PointLight(0x00f0ff, 0.25, 15);
            pl2.position.set(4, 3, 3);
            scene.add(pl2);

            world = new CANNON.World();
            world.gravity.set(0, -28, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;

            const gMat = new CANNON.Material();
            const gBody = new CANNON.Body({ mass: 0, material: gMat });
            gBody.addShape(new CANNON.Plane());
            gBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(gBody);

            const gGeo = new THREE.PlaneGeometry(40, 40);
            const gMesh = new THREE.Mesh(gGeo, new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.9 }));
            gMesh.rotation.x = -Math.PI / 2;
            gMesh.receiveShadow = true;
            scene.add(gMesh);

            const grid = new THREE.GridHelper(4, 4, 0x0d0d0d, 0x080808);
            grid.position.y = 0.005;
            scene.add(grid);

            // WALLS
            const wallMat = new CANNON.Material();
            const wh = 1.2;
            const hw = 0.5;

            const wallDefs = [
                { x: 0, y: wh / 2, z: -BOUND, sx: BOUND * 2, sy: wh, sz: hw },
                { x: 0, y: wh / 2, z: BOUND,  sx: BOUND * 2, sy: wh, sz: hw },
                { x: -BOUND, y: wh / 2, z: 0, sx: hw, sy: wh, sz: BOUND * 2 },
                { x: BOUND,  y: wh / 2, z: 0, sx: hw, sy: wh, sz: BOUND * 2 },
            ];

            wallDefs.forEach(d => {
                const wb = new CANNON.Body({ mass: 0, material: wallMat });
                wb.addShape(new CANNON.Box(new CANNON.Vec3(d.sx / 2, d.sy / 2, d.sz / 2)));
                wb.position.set(d.x, d.y, d.z);
                world.addBody(wb);
            });

            const dMat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(gMat, dMat, { friction: 0.5, restitution: 0.2 }));
            world.addContactMaterial(new CANNON.ContactMaterial(wallMat, dMat, { friction: 0.4, restitution: 0.2 }));

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            container.addEventListener('click', (e) => {
                if (e.target.closest('select')) return;
                if (!isRolling) rollDice();
            });
            
            container.addEventListener('touchstart', (e) => {
                if (e.target.closest('select')) return;
                if (!isRolling) rollDice();
            }, { passive: false });

            renderLoop();
        }

        function renderLoop() {
            animFrameId = requestAnimationFrame(renderLoop);
            if (!isRolling) {
                const t = Date.now() * 0.0002;
                camera.position.set(Math.sin(t) * 0.3, 7.5, 5.5);
                camera.lookAt(0, 0.2, 0);
                renderer.render(scene, camera);
            }
        }

        function createDiceTexture(val) {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const x = c.getContext('2d');
            x.fillStyle = '#ffffff';
            x.fillRect(0, 0, 256, 256);
            x.strokeStyle = '#e0e0e0';
            x.lineWidth = 3;
            x.strokeRect(6, 6, 244, 244);
            const r = 16;
            const pts = {
                1: [[128, 128]],
                2: [[72, 72], [184, 184]],
                3: [[72, 72], [128, 128], [184, 184]],
                4: [[72, 72], [184, 72], [72, 184], [184, 184]],
                5: [[72, 72], [184, 72], [128, 128], [72, 184], [184, 184]],
                6: [[72, 56], [184, 56], [72, 128], [184, 128], [72, 200], [184, 200]]
            };
            pts[val].forEach(([px, py]) => {
                x.shadowColor = '#a855f7';
                x.shadowBlur = 8;
                x.fillStyle = '#a855f7';
                x.beginPath();
                x.arc(px, py, r, 0, Math.PI * 2);
                x.fill();
                x.shadowBlur = 0;
            });
            const tex = new THREE.CanvasTexture(c);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        function createDiceMats() {
            return [1, 6, 2, 5, 3, 4].map(v =>
                new THREE.MeshStandardMaterial({ map: createDiceTexture(v), roughness: 0.3, metalness: 0.05 })
            );
        }

        function clearDice() {
            diceBodies.forEach(b => world.removeBody(b));
            diceMeshes.forEach(m => {
                scene.remove(m);
                m.geometry.dispose();
                m.material.forEach(mt => mt.dispose());
            });
            diceBodies = [];
            diceMeshes = [];
        }

        function getFaceValue(body) {
            const q = new THREE.Quaternion(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
            const m = new THREE.Matrix4().makeRotationFromQuaternion(q);
            const normals = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)
            ];
            const vals = [1, 6, 2, 5, 3, 4];
            let best = 1, maxDot = -Infinity;
            normals.forEach((n, i) => {
                const d = n.clone().applyMatrix4(m).dot(new THREE.Vector3(0, 1, 0));
                if (d > maxDot) { maxDot = d; best = vals[i]; }
            });
            return best;
        }

        async function rollDice() {
            if (isRolling) return;
            isRolling = true;

            document.getElementById('tapOverlay').classList.add('hidden');
            document.getElementById('rollingIndicator').classList.add('show');
            document.getElementById('diceResults').innerHTML = '';
            document.getElementById('totalLine').style.display = 'none';
            document.getElementById('statusText').innerHTML = '';

            clearDice();

            const count = parseInt(document.getElementById('diceCount').value);

            // --- PERBAIKAN POSISI JATUH ---
            // Spawn dalam grid rapat tepat di atas tengah
            const size = 0.42; // Ukuran diperkecil agar 10 muat di HP
            const positions = [];
            const gap = size * 1.6;
            const cols = Math.ceil(Math.sqrt(count));
            const rows = Math.ceil(count / cols);
            
            for (let i = 0; i < count; i++) {
                const c = i % cols;
                const r = Math.floor(i / cols);
                const offsetX = (c - (cols - 1) / 2) * gap;
                const offsetZ = (r - (rows - 1) / 2) * gap;
                positions.push({
                    x: offsetX + (Math.random() - 0.5) * 0.05,
                    y: 3.0 + Math.random() * 0.3, // Jatuh dari ketinggian rendah
                    z: offsetZ + (Math.random() - 0.5) * 0.05
                });
            }

            for (let i = 0; i < count; i++) {
                const body = new CANNON.Body({
                    mass: 1,
                    shape: new CANNON.Box(new CANNON.Vec3(size / 2, size / 2, size / 2))
                });

                body.position.set(positions[i].x, positions[i].y, positions[i].z);
                body.quaternion.setFromEuler(
                    Math.random() * Math.PI * 2,
                    Math.random() * Math.PI * 2,
                    Math.random() * Math.PI * 2
                );
                
                // Damping tinggi agar langsung berhenti & tidak meluncur jauh
                body.linearDamping = 0.6;
                body.angularDamping = 0.6;
                
                world.addBody(body);
                diceBodies.push(body);

                const geo = new THREE.BoxGeometry(size, size, size);
                const mats = createDiceMats();
                const mesh = new THREE.Mesh(geo, mats);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                diceMeshes.push(mesh);
            }

            // Impulse sangat kecil & terkontrol (hampir jatuh lurus)
            diceBodies.forEach(b => {
                b.applyImpulse(
                    new CANNON.Vec3(
                        (Math.random() - 0.5) * 0.5, // Gerak samping minimal
                        -1.0,                        // Gravitasi tambahan ke bawah
                        (Math.random() - 0.5) * 0.5
                    ),
                    b.position
                );
                b.angularVelocity.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
            });

            const start = Date.now();

            await new Promise(resolve => {
                function rollAnim() {
                    world.step(1 / 60);
                    diceBodies.forEach((b, i) => {
                        diceMeshes[i].position.copy(b.position);
                        diceMeshes[i].quaternion.copy(
                            new THREE.Quaternion(b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w)
                        );
                    });

                    const elapsed = Date.now() - start;
                    const t = Date.now() * 0.0003;
                    camera.position.set(Math.sin(t) * 0.5, 7.5, 5.5);
                    camera.lookAt(0, 0.2, 0);
                    renderer.render(scene, camera);

                    if (elapsed > 1200) {
                        const settled = diceBodies.every(b =>
                            b.velocity.length() < 0.08 && b.angularVelocity.length() < 0.08
                        );
                        if (settled || elapsed > 4000) {
                            resolve();
                            return;
                        }
                    }
                    requestAnimationFrame(rollAnim);
                }
                rollAnim();
            });

            document.getElementById('rollingIndicator').classList.remove('show');

            const values = diceBodies.map(b => getFaceValue(b));
            const total = values.reduce((a, b) => a + b, 0);
            const card = getCard(total);

            values.forEach((v, i) => {
                const chip = document.createElement('div');
                chip.className = 'dice-chip';
                chip.style.animationDelay = (i * 0.06) + 's';
                chip.textContent = v;
                document.getElementById('diceResults').appendChild(chip);
            });

            document.getElementById('totalLine').style.display = 'block';
            document.getElementById('totalValue').textContent = `TOTAL ${total}`;

            await sendNtfy(card, total, values);

            isRolling = false;
        }

        init();
    </script>
</body>
</html>
