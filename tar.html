<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarot & Zodiak Reader</title>
  <style>
    :root {
      --bg-dark: #0f0c1d;
      --gold: #d4af37;
      --card-bg: #1e1a33;
      --text-light: #f8f4ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2.5rem;
      color: var(--gold);
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
    }

    .input-section {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      margin-bottom: 2rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      background: #2a2645;
      border: 1px solid #555;
      color: white;
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.9rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    #randomize { background: #5d4a9e; color: white; }
    #generate { background: var(--gold); color: var(--bg-dark); }
    #manual { background: #3a2a6a; color: white; }

    button:hover { transform: scale(1.03); }

    .results {
      width: 90%;
      max-width: 900px;
      display: none;
      flex-direction: column;
      gap: 2rem;
    }

    .cards-container {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .card {
      width: 140px;
      background: #25213b;
      border: 2px solid var(--gold);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s forwards;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.4s; }
    .card:nth-child(3) { animation-delay: 0.6s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card-label {
      padding: 0.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: bold;
    }

    .reading, .zodiac {
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .reading h2, .zodiac h2 {
      color: var(--gold);
      margin-bottom: 1rem;
      text-align: center;
    }

    .date-display {
      text-align: center;
      margin-bottom: 1rem;
      font-style: italic;
      color: #aaa;
    }

    .loading {
      text-align: center;
      padding: 1.5rem;
      color: var(--gold);
    }

    .tarot-narrative {
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .tarot-narrative strong {
      color: var(--gold);
      font-weight: bold;
    }

    .advice {
      background: rgba(212, 175, 55, 0.1);
      padding: 1rem;
      border-left: 4px solid var(--gold);
      margin-top: 1rem;
      border-radius: 8px;
    }

    /* Modal Manual Selection */
    #manualModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 16px;
      width: 95%;
      max-width: 900px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #444;
    }

    .modal-title {
      color: var(--gold);
      font-size: 1.4rem;
    }

    .close-modal {
      background: #555;
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 0.8rem;
    }

    .manual-card {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.2s;
      height: 140px;
    }

    .manual-card:hover {
      transform: scale(1.05);
      border-color: var(--gold);
    }

    .manual-card.selected {
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
    }

    .manual-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .selection-info {
      margin-top: 1rem;
      text-align: center;
      color: #aaa;
    }

    .confirm-btn {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.8rem 2rem;
      background: var(--gold);
      color: var(--bg-dark);
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .confirm-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }
  </style>
</head>

    </div>
    <div class="input-group">
      <label for="day">Tanggal Lahir</label>

    </div>
    <div class="input-group">

        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6">Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
    </div>
    <div class="input-group">
      <label for="year">Tahun Lahir</label>
      <input type="number" id="year" placeholder="Contoh: 1995" min="1900" max="2025">
    </div>
    
    <div class="button-group">
      <button id="randomize">🔁 Acak Kartu</button>
      <button id="generate">✨ Buka Takdirmu</button>
      <button id="manual">🎨 Pilih Manual</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="date-display" id="date-display"></div>
    <div class="cards-container" id="cards"></div>
    <div class="reading" id="tarot-reading">

      <div class="tarot-narrative" id="reading-text"></div>
    </div>
    <div class="zodiac" id="zodiac-section">
      <h2>♈ Karakter Zodiak</h2>
      <p id="zodiac-text"></p>
    </div>
  </div>

      </div>

      </div>
      <button class="confirm-btn" id="confirmSelection" disabled>Konfirmasi & Baca Takdir</button>
    </div>

      "Aries": "Sebagai Aries, kamu adalah jiwa pemberani yang lahir untuk memimpin. Energi Mars memberimu semangat tak terbendung, tekad baja, dan hasrat untuk memulai hal baru. Namun, di balik keberanianmu, ada kebutuhan mendalam akan pengakuan dan kebebasan. Saat ini, alam semesta mengajakmu menyeimbangkan antara aksi cepat dan refleksi. Jangan terburu-buru hanya karena takut ketinggalan — kadang, diam sejenak justru membawamu lebih jauh.",

      "Cancer": "Cancer, hatimu adalah rumah bagi banyak orang. Kamu empatik, intuitif, dan sangat protektif terhadap yang kamu cintai. Bulan sebagai penguasamu membuat emosimu dalam seperti lautan — kadang tenang, kadang bergelora. Kamu butuh ruang aman untuk merasa utuh. Saat ini, alam semesta mengingatkanmu: jangan lupa merawat dirimu sendiri. Memberi cinta itu indah, tapi kamu juga layak menerimanya. Bangun pagar emosional yang sehat — bukan untuk menutup, tapi untuk melindungi.",
      "Leo": "Leo, kamu lahir untuk bersinar. Dengan matahari sebagai penguasamu, kamu membawa kehangatan, kreativitas, dan kepercayaan diri ke mana pun kamu pergi. Kamu murah hati, karismatik, dan punya jiwa kepemimpinan alami. Tapi di balik sorotan itu, kamu butuh validasi yang tulus. Saat ini, alam semesta mengajakmu bersinar tanpa perlu penonton. Lakukan sesuatu karena kamu mencintainya, bukan karena ingin dipuji. Kepuasan sejati datang dari dalam.",

      "Libra": "Libra, kamu adalah penjaga keseimbangan dan harmoni. Diperintah oleh Venus, kamu mencintai keindahan, keadilan, dan hubungan yang bermakna. Kamu punya kemampuan alami untuk melihat dua sisi dan menemukan titik temu. Tapi keinginanmu untuk menyenangkan semua orang kadang membuatmu kehilangan suaramu sendiri. Saat ini, alam semesta mendorongmu untuk memilih: apa yang benar-benar kamu inginkan? Keseimbangan dimulai dari kejujuran pada diri sendiri.",
      "Scorpio": "Scorpio, kamu adalah transformator batin yang tak terlihat. Diperintah oleh Pluto dan Mars, kamu intens, penuh gairah, dan punya kemampuan luar biasa untuk melihat kebenaran tersembunyi. Kamu tidak takut pada bayangan — justru di sanalah kamu menemukan kekuatan. Tapi kecenderunganmu untuk mengendalikan bisa menjadi belenggu. Saat ini, alam semesta mengajakmu melepaskan. Percayalah: dengan melepaskan, kamu justru mendapatkan kekuatan sejati.",
      "Sagittarius": "Sagittarius, jiwamu adalah petualang abadi. Diperintah oleh Jupiter, kamu optimis, jujur, dan selalu mencari makna dalam segala hal. Kamu membenci rutinitas dan merindukan kebebasan untuk menjelajah — baik secara fisik maupun intelektual. Tapi keinginanmu untuk 'lari' kadang membuatmu menghindari tanggung jawab. Saat ini, alam semesta mengingatkanmu: kebebasan sejati lahir dari komitmen yang disadari, bukan dari pelarian.",
      "Capricorn": "Capricorn, kamu adalah pembangun kerajaan dari batu-batu kecil. Diperintah oleh Saturnus, kamu disiplin, ambisius, dan sangat bertanggung jawab. Kamu percaya pada usaha keras dan kesabaran jangka panjang. Tapi di balik keteguhanmu, ada rasa takut akan kegagalan yang seringkali tak terucap. Saat ini, alam semesta mengajakmu untuk sedikit bersantai. Nikmati proses, bukan hanya hasil. Kesuksesan bukan hanya pencapaian — tapi juga kedamaian dalam perjalanan.",
      "Aquarius": "Aquarius, kamu adalah visioner yang hidup di masa depan. Diperintah oleh Uranus, kamu inovatif, independen, dan punya kepedulian mendalam pada kemanusiaan. Kamu melihat dunia dengan cara yang unik, dan sering dianggap 'aneh' — padahal, kamu hanya berada di frekuensi yang berbeda. Tapi kecenderunganmu untuk menjauh secara emosional bisa membuatmu kesepian. Saat ini, alam semesta mengingatkanmu: koneksi manusia nyata sama pentingnya dengan ide brilianmu.",

    const zodiacRanges = [
      { sign: "Capricorn", start: [12, 22], end: [1, 19] },
      { sign: "Aquarius", start: [1, 20], end: [2, 18] },
      { sign: "Pisces", start: [2, 19], end: [3, 20] },
      { sign: "Aries", start: [3, 21], end: [4, 19] },
      { sign: "Taurus", start: [4, 20], end: [5, 20] },
      { sign: "Gemini", start: [5, 21], end: [6, 20] },
      { sign: "Cancer", start: [6, 21], end: [7, 22] },
      { sign: "Leo", start: [7, 23], end: [8, 22] },
      { sign: "Virgo", start: [8, 23], end: [9, 22] },
      { sign: "Libra", start: [9, 23], end: [10, 22] },
      { sign: "Scorpio", start: [10, 23], end: [11, 21] },
      { sign: "Sagittarius", start: [11, 22], end: [12, 21] }
    ];

    // === Fungsi Umum ===
    function getZodiacSign(day, month) {
      for (const z of zodiacRanges) {
        const [startMonth, startDay] = z.start;
        const [endMonth, endDay] = z.end;
        if ((month === startMonth && day >= startDay) || (month === endMonth && day <= endDay)) {
          return z.sign;
        }
      }
      return "Unknown";
    }

    function getIndonesianDate() {
      const now = new Date();
      return now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function fetchAllCards() {
      try {
        const res = await fetch('https://rws-cards-api.herokuapp.com/api/v1/cards');
        if (!res.ok) throw new Error('API tidak merespons');
        const data = await res.json();
        return data.cards && data.cards.length >= 78 ? data.cards : fallbackFullDeck;
      } catch (err) {
        console.warn("Menggunakan fallback 78 kartu karena:", err.message);
        return fallbackFullDeck;
      }
    }

    function pickThreeUnique(cards) {
      const selected = [];
      const used = new Set();
      while (selected.length < 3) {
        const idx = Math.floor(Math.random() * cards.length);
        if (!used.has(idx)) {
          used.add(idx);
          selected.push(cards[idx]);
        }
      }
      return selected;
    }

    function renderCards(cards, container) {
      container.innerHTML = '';
      const positions = ["Masa Lalu", "Sekarang", "Masa Depan"];
      cards.forEach((card, i) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        cardEl.innerHTML = `
          <img src="${card.img || card.image}" alt="${card.name}" 
               onerror="this.src='https://via.placeholder.com/140x220/1e1a33/d4af37?text=${encodeURIComponent(card.name.substring(0,12))}'">
          <div class="card-label">${positions[i]}</div>
        `;
        container.appendChild(cardEl);
      });
    }

    function generateReading(name, cards, date, isManual = false) {
      const [past, present, future] = cards.map(c => c.meaning_up || "Makna tidak tersedia");
      const pastName = cards[0].name;
      const presentName = cards[1].name;
      const futureName = cards[2].name;

      let intro = isManual 
        ? `Berikut takdirmu berdasarkan pilihan kartu manual:` 
        : `Halo, ${name}! Berikut takdirmu hari ini:`;

      const narrative = `
        <strong>${date}</strong><br><br>
        ${intro}<br><br>

        <strong>✧ Masa Lalu:</strong> ${pastName}<br>
        Kamu datang dari energi ${past}. Ini adalah akar dari siapa kamu sekarang — mungkin ada pelajaran yang belum sepenuhnya dipahami, atau pengalaman yang masih membayangi. Tapi ingat, setiap jejak masa lalu adalah batu pijakan menuju versi terbaikmu.<br><br>

        <strong>✧ Saat Ini:</strong> ${presentName}<br>
        Kamu berdiri di tengah arus energi ${present}. Ini adalah waktu untuk memahami apa yang benar-benar kamu butuhkan sekarang — bukan apa yang orang lain harapkan, bukan apa yang kamu pikir harus kamu lakukan. Dengarkan hatimu. Kamu sedang dalam proses integrasi, dan itu butuh keberanian.<br><br>

        <strong>✧ Masa Depan:</strong> ${futureName}<br>
        Di depanmu, ada potensi besar: ${future}. Ini bukan takdir yang kaku, tapi undangan — undangan untuk berubah, untuk melepaskan beban lama, dan untuk menemukan kekuatan baru. Jika kamu tetap berani dan jujur pada diri sendiri, masa depan akan membawamu ke tempat yang lebih ringan, lebih bermakna, dan lebih damai.<br><br>

        <div class="advice">
          <strong>📌 Saran untukmu:</strong><br>
          - <strong>Hadapi masa lalu tanpa rasa bersalah</strong>. Itu bukan identitasmu, tapi pelajarannya.<br>
          - <strong>Di saat ini, prioritaskan kebutuhan batinmu</strong>. Jangan abaikan suara hati.<br>
          - <strong>Masa depan menanti kamu yang berani berubah</strong>. Ambil langkah kecil, tapi konsisten. Keajaiban dimulai dari tindakan nyata.
        </div><br>

        Ketiga kartu ini membentuk alur transformasi: dari akar masa lalu, energi kini, hingga potensi yang menanti. 
        Dengarkan pesan mereka dengan hati terbuka — kamu lebih kuat dari yang kamu kira.
      `;

      return narrative;
    }

    // === Event Listeners ===
    document.getElementById('randomize').addEventListener('click', async () => {
      const cards = await fetchAllCards();
      const selected = pickThreeUnique(cards);
      renderCards(selected, document.getElementById('cards'));
      document.getElementById('results').style.display = 'flex';
      document.getElementById('tarot-reading').style.display = 'block';
      document.getElementById('zodiac-section').style.display = 'none';
      document.getElementById('date-display').textContent = `📅 Dibaca pada: ${getIndonesianDate()}`;
      const reading = generateReading("", selected, getIndonesianDate(), true);
      document.getElementById('reading-text').innerHTML = reading;
    });

    document.getElementById('generate').addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const day = parseInt(document.getElementById('day').value);
      const month = parseInt(document.getElementById('month').value);
      const year = document.getElementById('year').value;

      if (!name || !day || !month || !year) {
        alert("Harap lengkapi nama, tanggal, bulan, dan tahun lahir!");
        return;
      }

      if (day < 1 || day > 31) {
        alert("Tanggal lahir harus antara 1–31.");
        return;
      }

      const dateStr = getIndonesianDate();
      document.getElementById('date-display').textContent = `📅 Dibaca pada: ${dateStr}`;

      document.getElementById('cards').innerHTML = '<div class="loading">Mengocok kartu takdir...</div>';
      document.getElementById('results').style.display = 'flex';

      const cards = await fetchAllCards();
      const selected = pickThreeUnique(cards);
      renderCards(selected, document.getElementById('cards'));

      const reading = generateReading(name, selected, dateStr, false);
      document.getElementById('reading-text').innerHTML = reading;
      document.getElementById('tarot-reading').style.display = 'block';

      const zodiac = getZodiacSign(day, month);
      const desc = detailedZodiac[zodiac] || "Zodiak tidak dapat ditentukan.";
      document.getElementById('zodiac-text').textContent = desc;
      document.getElementById('zodiac-section').style.display = 'block';
    });

    // === Fitur Manual ===
    let manualSelected = [];
    const maxSelection = 3;

    function openManualSelection() {
      document.getElementById('manualModal').style.display = 'flex';
      loadManualCards();
    }

    async function loadManualCards() {
      const grid = document.getElementById('manualCardsGrid');
      grid.innerHTML = '<div style="text-align:center;width:100%;padding:1rem;color:#aaa;">Memuat 78 kartu...</div>';
      manualSelected = [];

      const cards = await fetchAllCards(); // Ambil 78 kartu

      grid.innerHTML = '';
      cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'manual-card';
        cardEl.dataset.name = card.name;
        cardEl.innerHTML = `<img src="${card.img}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/90x140/1e1a33/d4af37?text=${encodeURIComponent(card.name.split(' ').pop())}'">`;
        cardEl.addEventListener('click', () => toggleCardSelection(cardEl, card));
        grid.appendChild(cardEl);
      });

      updateSelectionUI();
    }

    function toggleCardSelection(el, card) {
      const isSelected = el.classList.contains('selected');
      if (isSelected) {
        el.classList.remove('selected');
        manualSelected = manualSelected.filter(c => c.name !== card.name);
      } else {
        if (manualSelected.length >= maxSelection) {
          alert(`Maksimal hanya ${maxSelection} kartu yang bisa dipilih.`);
          return;
        }
        el.classList.add('selected');
        manualSelected.push(card);
      }
      updateSelectionUI();
    }

    function updateSelectionUI() {
      document.getElementById('selectedCount').textContent = manualSelected.length;
      document.getElementById('confirmSelection').disabled = manualSelected.length !== maxSelection;
    }

    document.getElementById('confirmSelection').addEventListener('click', () => {
      if (manualSelected.length === 3) {
        document.getElementById('manualModal').style.display = 'none';
        renderCards(manualSelected, document.getElementById('cards'));
        document.getElementById('results').style.display = 'flex';
        document.getElementById('tarot-reading').style.display = 'block';
        document.getElementById('zodiac-section').style.display = 'none';
        document.getElementById('date-display').textContent = `📅 Dibaca pada: ${getIndonesianDate()}`;
        const reading = generateReading("", manualSelected, getIndonesianDate(), true);
        document.getElementById('reading-text').innerHTML = reading;
      }
    });

    document.querySelector('.close-modal').addEventListener('click', () => {
      document.getElementById('manualModal').style.display = 'none';
    });

    document.getElementById('manual').addEventListener('click', openManualSelection);

    // Tutup modal jika klik di luar
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('manualModal');
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>
