<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forcing Matrix Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2rem;
  background: linear-gradient(90deg, #00f7ff, #ff00c8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
  width: 180px;
}

button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  margin: 5px;
  background: linear-gradient(45deg, #00f7ff, #ff00c8);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00f7ff;
}

table {
  margin: 30px auto;
  border-collapse: collapse;
}

td {
  width: 60px;
  height: 60px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
  border-radius: 8px;
}

td:hover {
  background: rgba(255,255,255,0.1);
}

.selected {
  background: linear-gradient(45deg, #00f7ff, #ff00c8);
  color: black;
  font-weight: bold;
  box-shadow: 0 0 20px #00f7ff;
}

.blocked {
  opacity: 0.15;
  pointer-events: none;
}

.header {
  opacity: 0.3;
  pointer-events: none;
}
</style>
</head>

<body>

<h1>FORCING MATRIX</h1>

<input type="number" id="number-input" placeholder="Target number">
<button onclick="generate()">Generate</button>
<button id="downloadBtn" onclick="downloadTable()" style="display:none;">Download</button>

<div id="table-container"></div>

<script>
function generate() {
  const number = parseInt(document.getElementById("number-input").value);
  if (!number || number <= 10) return;

  let numbers = [];
  let remaining = number;

  for (let i = 0; i < 9; i++) {
    let val = Math.floor(Math.random() * remaining / 2) + 1;
    numbers.push(val);
    remaining -= val;
  }
  numbers.push(remaining);

  const horizontal = numbers.slice(0, 5);
  const vertical = numbers.slice(5);

  let html = "<table id='matrix'>";

  for (let r = 0; r < 6; r++) {
    html += "<tr>";
    for (let c = 0; c < 6; c++) {

      if (r === 0 && c === 0) {
        html += "<td class='header exclude-download'></td>";
      } else {
        const val = (c>0?horizontal[c-1]:0)+(r>0?vertical[r-1]:0);
        const isHeader = (r===0 || c===0);

        html += `<td 
          class="${isHeader ? 'header exclude-download' : ''}" 
          data-row="${r}" 
          data-col="${c}">
          ${val}
        </td>`;
      }

    }
    html += "</tr>";
  }

  html += "</table>";
  document.getElementById("table-container").innerHTML = html;

  attachEvents();
  document.getElementById("downloadBtn").style.display = "inline-block";
}

function attachEvents() {
  const cells = document.querySelectorAll("#matrix td");

  cells.forEach(cell => {
    if (!cell.classList.contains("header")) {
      cell.addEventListener("click", () => selectCell(cell));
    }
  });
}

function selectCell(cell) {
  if (cell.classList.contains("blocked")) return;

  cell.classList.add("selected");

  const row = cell.dataset.row;
  const col = cell.dataset.col;

  document.querySelectorAll("#matrix td").forEach(c => {
    if (
      c.dataset &&
      (c.dataset.row === row || c.dataset.col === col) &&
      c !== cell
    ) {
      c.classList.add("blocked");
    }
  });
}

function downloadTable() {
  const original = document.getElementById("matrix");
  if (!original) return;

  const clone = original.cloneNode(true);

  // HAPUS HEADER (sesuai garis merah kamu)
  clone.querySelectorAll(".exclude-download").forEach(el => el.remove());

  // Bersihkan style biar jelas
  clone.querySelectorAll("td").forEach(td => {
    td.classList.remove("blocked", "selected");
    td.style.opacity = "1";
    td.style.background = "#111";
    td.style.color = "#fff";
    td.style.fontWeight = "bold";
  });

  clone.style.position = "absolute";
  clone.style.left = "-9999px";
  document.body.appendChild(clone);

  html2canvas(clone, {
    backgroundColor: "#0f2027",
    scale: 2
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "matrix-clean.jpg";
    link.href = canvas.toDataURL("image/jpeg", 1.0);
    link.click();

    document.body.removeChild(clone);
  });
}
</script>

</body>
</html>
